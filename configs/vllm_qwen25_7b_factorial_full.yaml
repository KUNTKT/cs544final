# Full factorial 3×2×3×2 = 36 conditions + StrategyQA subsample + vLLM + local Qwen2.5-7B-Instruct
backend: vllm

data:
  path: /scratch/ktang115/data/strategy-qa/strategyQA_train.json
  max_items: 1000
  seed: 42

model:
  name: /scratch/ktang115/models/Qwen2.5-7B-Instruct
  trust_remote_code: true

generation:
  max_new_tokens: 512
  do_sample: false
  temperature: 0.0
  top_p: 1.0

self_consistency:
  enabled: false
  num_samples: 5
  temperature: 0.7
  top_p: 0.95

output:
  dir: ./outputs

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  dtype: auto
  max_model_len: 4096
  batch_size: 8
  enforce_eager: true
